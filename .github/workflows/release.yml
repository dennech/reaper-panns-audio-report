name: release-assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-runtime-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle_key: macos-arm64
            runs_on: macos-14
          - bundle_key: macos-x86_64
            runs_on: macos-13
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bundle build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build

      - name: Build bundled runtime asset
        run: |
          python3 scripts/build_runtime_bundle.py \
            --bundle-key "${{ matrix.bundle_key }}" \
            --output-dir dist \
            --metadata-json "dist/${{ matrix.bundle_key }}.runtime-bundle.json"

      - name: Upload runtime bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.bundle_key }}
          path: |
            dist/*.tar.gz
            dist/*.runtime-bundle.json

  build-manual-installers:
    strategy:
      fail-fast: false
      matrix:
        bundle_key: [macos-arm64, macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build manual installer ZIP
        run: |
          python3 scripts/build_manual_installer.py \
            --bundle-key "${{ matrix.bundle_key }}" \
            --output-dir dist \
            --metadata-json "dist/${{ matrix.bundle_key }}.manual-installer.json"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.bundle_key }}
          path: |
            dist/*.zip
            dist/*.manual-installer.json

  publish-release-assets:
    needs:
      - build-runtime-bundles
      - build-manual-installers
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download runtime bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact tree
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;

      - name: Build release manifest
        run: |
          python3 scripts/build_release_manifest.py \
            --runtime-metadata dist/*.runtime-bundle.json \
            --installer-metadata dist/*.manual-installer.json

      - name: Create release if missing
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --title "${GITHUB_REF_NAME}" --notes ""
          fi

      - name: Upload release assets
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.zip dist/*release-manifest.json --clobber
