name: tests

on:
  push:
  pull_request:

jobs:
  macos-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "numpy>=1.26,<2.0" "soundfile>=0.12,<1.0" "pytest>=8.2,<9.0"

      - name: Set up Lua
        run: |
          brew install lua

      - name: Run Python tests
        run: |
          python3 tests/scripts/run_python_tests.py --scope python

      - name: Run integration tests
        run: |
          python3 tests/scripts/run_python_tests.py --scope integration

      - name: Run Lua tests
        run: |
          lua tests/lua/run_tests.lua
